<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>京东方A 交易面板</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
  }
  #app {
    max-width: 1200px;
    margin: 0 auto;
  }
  .header {
    text-align: center;
    color: white;
    margin-bottom: 30px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }
  .header .subtitle {
    font-size: 16px;
    opacity: 0.9;
  }
  .card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    padding: 24px;
    margin-bottom: 24px;
    transition: transform 0.3s ease;
  }
  .card:hover {
    transform: translateY(-5px);
  }
  .card-title {
    font-size: 18px;
    font-weight: 600;
    color: #333;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 2px solid #f0f0f0;
  }
  .chart-container {
    width: 100%;
    height: 500px;
  }
  .volume-container {
    width: 100%;
    height: 200px;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }
  .stat-value {
    font-size: 24px;
    font-weight: 700;
    color: #333;
    margin-bottom: 5px;
  }
  .stat-label {
    font-size: 14px;
    color: #666;
  }
  .positive { color: #e74c3c; }
  .negative { color: #27ae60; }
  .footer {
    text-align: center;
    color: white;
    opacity: 0.8;
    margin-top: 30px;
    font-size: 14px;
  }
  .table-container {
    max-height: 400px;
    overflow-y: auto;
    border-radius: 8px;
    border: 1px solid #e0e0e0;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th, td {
    padding: 12px 15px;
    text-align: right;
    border-bottom: 1px solid #f0f0f0;
  }
  th {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    font-weight: 600;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  th:first-child,
  td:first-child {
    text-align: left;
  }
  tr:hover {
    background-color: #f8f9fa;
  }
  tr:nth-child(even) {
    background-color: #fafafa;
  }
  .table-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 2px solid #f0f0f0;
  }
  .table-footer span {
    color: #666;
    font-size: 14px;
  }
  .pagination {
    display: flex;
    gap: 8px;
  }
  .pagination button {
    padding: 8px 12px;
    border: 1px solid #ddd;
    background: white;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    color: #333;
    transition: all 0.3s;
  }
  .pagination button:hover {
    background: #667eea;
    color: white;
    border-color: #667eea;
  }
  .pagination button.active {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-color: #667eea;
  }
  .pagination button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  @media (max-width: 768px) {
    body { padding: 10px; }
    .header h1 { font-size: 22px; }
    .chart-container { height: 400px; }
    .volume-container { height: 150px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .table-container { max-height: 300px; }
    th, td { padding: 8px 10px; font-size: 12px; }
    .pagination button { padding: 6px 10px; font-size: 12px; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>京东方A（000725）交易面板</h1>
    <div class="subtitle">过去一年交易数据可视化</div>
  </div>
  
  <div class="stats" id="stats"></div>
  
  <div class="card">
    <div class="card-title">📈 K线图</div>
    <div id="kline" class="chart-container"></div>
  </div>
  
  <div class="card">
    <div class="card-title">📊 成交量</div>
    <div id="volume" class="volume-container"></div>
  </div>
  
  <div class="card">
    <div class="card-title">📋 交易数据</div>
    <div class="table-container">
      <table id="dataTable">
        <thead>
          <tr>
            <th>日期</th>
            <th>开盘价</th>
            <th>最高价</th>
            <th>最低价</th>
            <th>收盘价</th>
            <th>成交量</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="table-footer">
      <span id="tableInfo"></span>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
  
  <div class="footer">
    数据来源：Tushare Pro | 生成时间：2026-07-04 19:41:24
  </div>
</div>

// 计算统计数据
function calculateStats() {
  const closes = RAW.ohlc.map(d => d[1]);
  const vols = RAW.vols;
  
  const latest = closes[closes.length - 1];
  const prev = closes[closes.length - 2] || latest;
  const change = latest - prev;
  const changePercent = (change / prev * 100).toFixed(2);
  
  const max = Math.max(...closes);
  const min = Math.min(...closes);
  const avgVol = Math.round(vols.reduce((a, b) => a + b, 0) / vols.length);
  
  return {
    latest: latest.toFixed(2),
    change: change.toFixed(2),
    changePercent: changePercent,
    max: max.toFixed(2),
    min: min.toFixed(2),
    avgVol: avgVol.toLocaleString(),
    totalDays: closes.length
  };
}

// 渲染统计卡片
function renderStats() {
  const stats = calculateStats();
  const isPositive = parseFloat(stats.change) >= 0;
  
  document.getElementById('stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-value">${stats.latest}</div>
      <div class="stat-label">最新价（元）</div>
    </div>
    <div class="stat-card">
      <div class="stat-value ${isPositive ? 'positive' : 'negative'}">
        ${isPositive ? '+' : ''}${stats.change} (${isPositive ? '+' : ''}${stats.changePercent}%)
      </div>
      <div class="stat-label">涨跌幅</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${stats.max}</div>
      <div class="stat-label">最高价（元）</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${stats.min}</div>
      <div class="stat-label">最低价（元）</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${stats.avgVol}</div>
      <div class="stat-label">平均成交量（手）</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${stats.totalDays}</div>
      <div class="stat-label">交易天数</div>
    </div>
  `;
}

// 联动K线图和成交量图
function linkCharts(kline, volume) {
  kline.on('datazoom', function(params) {
    volume.dispatchAction({
      type: 'dataZoom',
      start: params.start,
      end: params.end
    });
  });
  
  volume.on('datazoom', function(params) {
    kline.dispatchAction({
      type: 'dataZoom',
      start: params.start,
      end: params.end
    });
  });
}

// 表格分页和渲染
function initTable() {
  const tableData = RAW.tableData;
  const rowsPerPage = 20;
  let currentPage = 1;
  let filteredData = [...tableData];
  
  function renderTable() {
    const tbody = document.querySelector('#dataTable tbody');
    const start = (currentPage - 1) * rowsPerPage;
    const end = start + rowsPerPage;
    const pageData = filteredData.slice(start, end);
    
    tbody.innerHTML = pageData.map(row => `
      <tr>
        <td>${row.date}</td>
        <td>${row.open}</td>
        <td>${row.high}</td>
        <td>${row.low}</td>
        <td>${row.close}</td>
        <td>${row.vol.toLocaleString()}</td>
      </tr>
    `).join('');
    
    // 更新表格信息
    const tableInfo = document.getElementById('tableInfo');
    tableInfo.textContent = `显示 ${start + 1}-${Math.min(end, filteredData.length)} 条，共 ${filteredData.length} 条`;
    
    // 渲染分页
    renderPagination();
  }
  
  function renderPagination() {
    const totalPages = Math.ceil(filteredData.length / rowsPerPage);
    const pagination = document.getElementById('pagination');
    
    let buttons = [];
    
    // 上一页按钮
    buttons.push(`<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`);
    
    // 页码按钮
    const maxVisiblePages = 5;
    let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
    let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
    
    if (endPage - startPage + 1 < maxVisiblePages) {
      startPage = Math.max(1, endPage - maxVisiblePages + 1);
    }
    
    if (startPage > 1) {
      buttons.push(`<button onclick="changePage(1)">1</button>`);
      if (startPage > 2) {
        buttons.push(`<button disabled>...</button>`);
      }
    }
    
    for (let i = startPage; i <= endPage; i++) {
      buttons.push(`<button onclick="changePage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`);
    }
    
    if (endPage < totalPages) {
      if (endPage < totalPages - 1) {
        buttons.push(`<button disabled>...</button>`);
      }
      buttons.push(`<button onclick="changePage(${totalPages})">${totalPages}</button>`);
    }
    
    // 下一页按钮
    buttons.push(`<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`);
    
    pagination.innerHTML = buttons.join('');
  }
  
  window.changePage = function(page) {
    const totalPages = Math.ceil(filteredData.length / rowsPerPage);
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderTable();
  };
  
  // 初始渲染
  renderTable();
}

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', function() {
  renderStats();
  const kline = initKline();
  const volume = initVolume();
  linkCharts(kline, volume);
  initTable();
});
</script>
</body>
